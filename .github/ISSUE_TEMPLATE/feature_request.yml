name: Feature request
description: Suggest a new entity, control, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What would you like to see?
      description: Describe the feature and the use case it solves.
    validations:
      required: true
  - type: input
    id: device_model
    attributes:
      label: Device model (if relevant)
      placeholder: "Zettlab D6 Ultra"
  - type: textarea
    id: details
    attributes:
      label: Additional context
      description: |
        If this involves a device capability, any API details you can capture
        (endpoint, payload) greatly speed up implementation. See CLAUDE.md.
