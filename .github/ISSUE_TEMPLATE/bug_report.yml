name: Bug report
description: Report a problem with the Zettlab AINAS integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much as you can.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.2.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: device_model
    attributes:
      label: Device model & firmware
      placeholder: "Zettlab D4, ZettOS 1.9.0-beta"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead? Steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug logs
      description: |
        Enable debug logging (see docs/troubleshooting.md) and paste the relevant lines.
      render: text
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Attach the diagnostics file from the device page (secrets are redacted).
